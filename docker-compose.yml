services:
  postgres:
    image: postgres:15-alpine
    container_name: student-postgres
    environment:
      POSTGRES_USER: studentuser
      POSTGRES_PASSWORD: studentpass
      POSTGRES_DB: studentdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - student-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studentuser -d studentdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: student-backend
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: studentdb
      DB_USER: studentuser
      DB_PASSWORD: studentpass
    ports:
      - "3001:3001"
    networks:
      - student-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: student-frontend
    ports:
      - "27491:80"
    networks:
      - student-network
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  student-network:
    driver: bridge
